services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: [ "sh", "-c", "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'" ]

  backend:
    build: ./backend
    container_name: geo-backend
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - LLM_MODEL=llama3
      - ALLOWED_ORIGINS=*
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: geo-tunnel
    command: tunnel --url http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: geo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    restart: always

volumes:
  ollama_data:
