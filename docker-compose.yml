services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "sleep 10 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'" ]

  backend:
    build: ./backend
    container_name: geo-backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    restart: always

  frontend:
    build: ./frontend
    container_name: geo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  ollama_data:
